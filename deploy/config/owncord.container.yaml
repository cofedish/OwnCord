# Container-oriented OwnCord configuration.
# This file assumes TLS is terminated by a reverse proxy such as Caddy/Nginx.
server:
  port: 8080
  name: "OwnCord Server"
  data_dir: "/app/data"
  allowed_origins: []
  trusted_proxies:
    - "172.30.0.0/24"
  admin_allowed_cidrs:
    - "127.0.0.0/8"
    - "::1/128"
    - "172.30.0.0/24"

database:
  driver: "postgres"
  url: "postgres://owncord:owncord-change-me@postgres:5432/owncord?sslmode=disable"
  path: "/app/data/chatserver.db"
  max_open_conns: 25
  max_idle_conns: 25
  conn_max_lifetime_minutes: 30

redis:
  addr: "redis:6379"
  password: "owncord-change-me"
  db: 0
  key_prefix: "owncord:"

object_storage:
  provider: "s3"
  endpoint: "minio:9000"
  region: "us-east-1"
  bucket: "owncord"
  access_key: "owncord"
  secret_key: "owncord-change-me"
  use_ssl: false
  force_path_style: true

tls:
  mode: "off"

upload:
  max_size_mb: 100
  storage_dir: "/app/data/uploads"

voice:
  livekit_url: "ws://livekit.example.internal:7880"
  quality: "medium"
  # livekit_api_key: ""
  # livekit_api_secret: ""
  # livekit_binary: ""
  # node_ip: ""
